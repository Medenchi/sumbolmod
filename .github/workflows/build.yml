name: 🎬 Символ — Сборка и публикация

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

env:
  JAVA_VERSION: 17
  GRADLE_VERSION: 8.4

jobs:

  build:
    name: 🔨 Сборка мода
    runs-on: ubuntu-latest

    outputs:
      mod_version: ${{ steps.get_version.outputs.version }}
      jar_name: ${{ steps.get_version.outputs.jar_name }}
      mc_version: ${{ steps.get_version.outputs.mc_version }}

    steps:
      - name: 📥 Клонирование
        uses: actions/checkout@v4

      - name: ☕ Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 📖 Версия мода
        id: get_version
        run: |
          VERSION=$(grep "mod_version=" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          MC_VERSION=$(grep "minecraft_version=" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          JAR_NAME="symbolmod-${VERSION}+${MC_VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "jar_name=${JAR_NAME}" >> $GITHUB_OUTPUT
          echo "mc_version=${MC_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Версия: ${VERSION}"
          echo "🎮 Minecraft: ${MC_VERSION}"

      - name: 🔨 Сборка JAR
        uses: gradle/actions/setup-gradle@v3
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx3G -XX:MaxMetaspaceSize=512m" -Dorg.gradle.daemon=false'
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          arguments: |
            build 
            --no-daemon 
            --stacktrace 
            -Dorg.gradle.jvmargs="-Xmx3G -XX:MaxMetaspaceSize=512m"

      - name: ✅ Проверка JAR
        run: |
          echo "📂 build/libs:"
          ls -la build/libs/
          if [ -z "$(ls -A build/libs/*.jar 2>/dev/null)" ]; then
            echo "❌ JAR не найден!"
            exit 1
          fi
          echo "✅ JAR найден!"

      - name: 🔍 Валидация fabric.mod.json
        run: |
          python3 -c "
          import json, sys
          with open('src/main/resources/fabric.mod.json') as f:
              data = json.load(f)
          required = ['id', 'version', 'name', 'entrypoints', 'depends']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'❌ Отсутствуют поля: {missing}')
              sys.exit(1)
          print(f'✅ fabric.mod.json валиден')
          print(f'   ID: {data[\"id\"]}')
          print(f'   Версия: {data[\"version\"]}')
          "

      - name: 🔍 Валидация JSON
        run: |
          python3 -c "
          import json, os, sys
          errors = []
          checked = 0
          for root, dirs, files in os.walk('src/main/resources'):
              for file in files:
                  if file.endswith('.json'):
                      path = os.path.join(root, file)
                      try:
                          with open(path, encoding='utf-8') as f:
                              json.load(f)
                          checked += 1
                      except json.JSONDecodeError as e:
                          errors.append(f'{path}: {e}')
          print(f'Проверено: {checked} JSON файлов')
          if errors:
              [print(e) for e in errors]
              sys.exit(1)
          print('✅ Все JSON валидны!')
          "

      - name: 📤 Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_version.outputs.jar_name }}
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          retention-days: 30

      - name: 📊 Итог
        if: always()
        run: |
          echo "================================================"
          echo "  🎬 МОД СИМВОЛ"
          echo "================================================"
          if [ "${{ job.status }}" == "success" ]; then
            echo "  ✅ СБОРКА УСПЕШНА"
            echo "  📦 Версия:    ${{ steps.get_version.outputs.version }}"
            echo "  🎮 Minecraft: ${{ steps.get_version.outputs.mc_version }}"
          else
            echo "  ❌ СБОРКА ПРОВАЛИЛАСЬ"
          fi
          echo "  🌿 Ветка:     ${{ github.ref_name }}"
          echo "================================================"

  release:
    name: 🚀 Релиз
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: 📥 Клонирование
        uses: actions/checkout@v4

      - name: 📥 Скачивание артефакта
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.jar_name }}
          path: build/libs/

      - name: 🚀 Релиз
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          body: |
            ## 🎬 Символ v${{ needs.build.outputs.mod_version }}
            - Minecraft: ${{ needs.build.outputs.mc_version }}
            - Fabric Loader ≥ 0.15.0
            - GeckoLib 4.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
