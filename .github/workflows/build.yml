name: 🎬 Символ — Сборка и публикация

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

env:
  JAVA_VERSION: 17

jobs:

  build:
    name: 🔨 Сборка мода
    runs-on: ubuntu-latest

    outputs:
      mod_version: ${{ steps.get_version.outputs.version }}
      jar_name: ${{ steps.get_version.outputs.jar_name }}
      mc_version: ${{ steps.get_version.outputs.mc_version }}

    steps:
      - name: 📥 Клонирование
        uses: actions/checkout@v4

      - name: ☕ Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔑 Права на gradlew
        run: git update-index --chmod=+x gradlew

      - name: 📖 Версия мода
        id: get_version
        run: |
          VERSION=$(grep "mod_version" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          MC_VERSION=$(grep "minecraft_version" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          JAR_NAME="symbolmod-${VERSION}+${MC_VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "jar_name=${JAR_NAME}" >> $GITHUB_OUTPUT
          echo "mc_version=${MC_VERSION}" >> $GITHUB_OUTPUT
          echo "Версия: ${VERSION}, MC: ${MC_VERSION}"

      - name: 🔨 Сборка
        run: ./gradlew build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: ✅ Проверка JAR
        run: |
          ls -la build/libs/
          if [ -z "$(ls -A build/libs/*.jar 2>/dev/null)" ]; then
            echo "JAR не найден!"
            exit 1
          fi
          echo "JAR найден!"

      - name: 🔍 Валидация JSON
        run: |
          python3 -c "
          import json, os, sys
          errors = []
          checked = 0
          for root, dirs, files in os.walk('src/main/resources'):
              for file in files:
                  if file.endswith('.json'):
                      path = os.path.join(root, file)
                      try:
                          with open(path, encoding='utf-8') as f:
                              json.load(f)
                          checked += 1
                      except json.JSONDecodeError as e:
                          errors.append(f'{path}: {e}')
          print(f'Проверено: {checked} JSON файлов')
          if errors:
              [print(e) for e in errors]
              sys.exit(1)
          print('Все JSON валидны!')
          "

      - name: 📤 Артефакт
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_version.outputs.jar_name }}
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          retention-days: 30

  release:
    name: 🚀 Релиз
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.jar_name }}
          path: build/libs/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          body: |
            ## 🎬 Символ v${{ needs.build.outputs.mod_version }}
            - Minecraft: ${{ needs.build.outputs.mc_version }}
            - Fabric Loader ≥ 0.15.0
            - GeckoLib 4.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
