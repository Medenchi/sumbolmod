name: 🎬 Символ — Сборка и публикация

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Причина запуска сборки'
        required: false
        default: 'Ручная сборка'

env:
  JAVA_VERSION: 17
  MOD_NAME: symbolmod

jobs:

  # ============================================================
  # JOB 1 — ПРОВЕРКА КОДА
  # ============================================================
  validate:
    name: ✅ Проверка кода
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4

      - name: ☕ Установка Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Кэш Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔑 Права на Gradle
        run: chmod +x gradlew

      - name: 🔍 Проверка Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: 📋 Вывод информации о среде
        run: |
          java -version
          ./gradlew --version

  # ============================================================
  # JOB 2 — СБОРКА
  # ============================================================
  build:
    name: 🔨 Сборка мода
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      mod_version: ${{ steps.get_version.outputs.version }}
      jar_name: ${{ steps.get_version.outputs.jar_name }}

    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4

      - name: ☕ Установка Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Кэш Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔑 Права на Gradle
        run: chmod +x gradlew

      - name: 📖 Получение версии мода
        id: get_version
        run: |
          VERSION=$(grep "mod_version" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          MC_VERSION=$(grep "minecraft_version" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          JAR_NAME="symbolmod-${VERSION}+${MC_VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "jar_name=${JAR_NAME}" >> $GITHUB_OUTPUT
          echo "mc_version=${MC_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Версия мода: ${VERSION}"
          echo "🎮 Версия Minecraft: ${MC_VERSION}"
          echo "📁 Имя JAR: ${JAR_NAME}"

      - name: 🔨 Сборка JAR
        run: ./gradlew build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: ✅ Проверка существования JAR
        run: |
          echo "📂 Содержимое папки build/libs:"
          ls -la build/libs/
          if [ -z "$(ls -A build/libs/*.jar 2>/dev/null)" ]; then
            echo "❌ JAR файл не найден!"
            exit 1
          fi
          echo "✅ JAR файл найден!"

      - name: 🔍 Валидация fabric.mod.json
        run: |
          echo "📋 Проверка fabric.mod.json..."
          python3 -c "
          import json, sys
          with open('src/main/resources/fabric.mod.json') as f:
              data = json.load(f)
          required = ['id', 'version', 'name', 'entrypoints', 'depends']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'❌ Отсутствуют поля: {missing}')
              sys.exit(1)
          print(f'✅ fabric.mod.json валиден')
          print(f'   ID: {data[\"id\"]}')
          print(f'   Версия: {data[\"version\"]}')
          print(f'   Название: {data[\"name\"]}')
          "

      - name: 🔍 Валидация GeckoLib JSON файлов
        run: |
          echo "📋 Проверка .geo.json файлов..."
          ERRORS=0
          find src/main/resources/assets -name "*.geo.json" | while read f; do
            python3 -c "
          import json, sys
          try:
              with open('$f') as file:
                  json.load(file)
              print(f'  ✅ $f')
          except json.JSONDecodeError as e:
              print(f'  ❌ $f: {e}')
              sys.exit(1)
            " || ERRORS=$((ERRORS+1))
          done

          echo "📋 Проверка .animation.json файлов..."
          find src/main/resources/assets -name "*.animation.json" | while read f; do
            python3 -c "
          import json, sys
          try:
              with open('$f') as file:
                  json.load(file)
              print(f'  ✅ $f')
          except json.JSONDecodeError as e:
              print(f'  ❌ $f: {e}')
              sys.exit(1)
            "
          done

          echo "📋 Проверка sounds.json..."
          if [ -f "src/main/resources/assets/symbolmod/sounds.json" ]; then
            python3 -c "
          import json
          with open('src/main/resources/assets/symbolmod/sounds.json') as f:
              json.load(f)
          print('  ✅ sounds.json валиден')
            "
          fi

      - name: 📤 Загрузка JAR как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_version.outputs.jar_name }}
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          retention-days: 30

      - name: 📊 Информация о сборке
        run: |
          echo "================================================"
          echo "  🎬 МОД СИМВОЛ — СБОРКА ЗАВЕРШЕНА"
          echo "================================================"
          echo "  📦 Версия:    ${{ steps.get_version.outputs.version }}"
          echo "  🎮 Minecraft: ${{ steps.get_version.outputs.mc_version }}"
          echo "  📁 JAR:       ${{ steps.get_version.outputs.jar_name }}.jar"
          echo "  🌿 Ветка:     ${{ github.ref_name }}"
          echo "  💬 Коммит:    ${{ github.sha }}"
          echo "================================================"

  # ============================================================
  # JOB 3 — РЕЛИЗ (только при создании тега)
  # ============================================================
  release:
    name: 🚀 Публикация релиза
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4

      - name: 📥 Скачивание артефакта
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.jar_name }}
          path: build/libs/

      - name: 📋 Список файлов
        run: ls -la build/libs/

      - name: 🚀 Загрузка в GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          body: |
            ## 🎬 Символ — Версия ${{ needs.build.outputs.mod_version }}

            ### 📦 Установка
            1. Установите [Fabric Loader](https://fabricmc.net/use/installer/)
            2. Установите [Fabric API](https://modrinth.com/mod/fabric-api)
            3. Установите [GeckoLib](https://modrinth.com/mod/geckolib)
            4. Поместите `${{ needs.build.outputs.jar_name }}.jar` в папку `mods/`

            ### 🎮 Требования
            - Minecraft: 1.20.1
            - Fabric Loader: ≥ 0.15.0
            - Fabric API: 0.92.0+1.20.1
            - GeckoLib: 4.4

            ### ⚠️ Важно
            Мод создан **исключительно** для карты «Символ».
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
