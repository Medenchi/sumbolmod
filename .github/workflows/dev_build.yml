name: 🛠️ Dev сборка

on:
  push:
    branches:
      - dev
      - 'feature/**'
      - 'fix/**'

env:
  GRADLE_VERSION: 8.4

jobs:
  dev_build:
    name: 🛠️ Быстрая dev сборка
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Клонирование
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔨 Сборка
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          arguments: build --no-daemon

      - name: 📤 Загрузка dev артефакта
        uses: actions/upload-artifact@v4
        with:
          name: symbolmod-dev-${{ github.sha }}
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          retention-days: 7

      - name: 💬 Статус
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Dev сборка успешна!"
          else
            echo "❌ Dev сборка провалилась!"
          fi
